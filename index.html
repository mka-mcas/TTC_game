<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCAS Hazard Detection Simulator</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #game-container {
      border: 2px solid #333;
    }
    #controls, #hud, #leds {
      margin: 10px 0;
    }
    #led-green, #led-yellow, #led-red {
      width: 20px;
      height: 20px;
      display: inline-block;
      margin: 0 5px;
      border-radius: 50%;
    }
    #led-green { background: green; }
    #led-yellow { background: yellow; }
    #led-red { background: red; }
    .inactive { opacity: 0.3; }
    #ttc-chart {
      display: none;
      max-width: 400px;
    }
    button {
      padding: 5px 10px;
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="controls">
    <input type="range" id="speed-slider" min="0" max="120" value="85">
    <button id="brake">Brake</button>
    <button id="accelerate">Accelerate</button>
    <button id="toggle-chart">Toggle Chart</button>
  </div>
  <div id="hud">
    Speed: <span id="speed-value">85</span> km/h |
    TTC: <span id="ttc-value">0.0</span> s
  </div>
  <div id="leds">
    <div id="led-green" class="inactive"></div>
    <div id="led-yellow" class="inactive"></div>
    <div id="led-red" class="inactive"></div>
  </div>
  <div id="ttc-chart">
    <canvas id="ttcCanvas"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
